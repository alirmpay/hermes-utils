services:
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: langfuse-web
    restart: unless-stopped
    depends_on:
      - langfuse-clickhouse
      - langfuse-redis
      - langfuse-minio
    ports:
      - "3295:3000"
    env_file:
      - .env
    environment:
      NEXTAUTH_URL: http://127.0.0.1:3295          # ← change if needed
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      LANGFUSE_S3_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_REGION: auto
      TELEMETRY_ENABLED: "false"
    networks:
      - llm-network
      - postgres-network
      - npm-network

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    restart: unless-stopped
    depends_on:
      - langfuse-web
    env_file:
      - .env
    environment:
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      LANGFUSE_S3_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_REGION: auto
    networks:
      - llm-network
      - postgres-network

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: langfuse-clickhouse
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
    networks:
      - llm-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    restart: unless-stopped
    networks:
      - llm-network

  langfuse-minio:
    image: minio/minio:latest
    container_name: langfuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_S3_SECRET_ACCESS_KEY}
    volumes:
      - langfuse_minio_data:/data
    networks:
      - llm-network

volumes:
  langfuse_clickhouse_data:
  langfuse_minio_data:

networks:
  llm-network:
    external: true
  postgres-network:
    external: true
  npm-network:
    external: true
