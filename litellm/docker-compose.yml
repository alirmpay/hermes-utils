services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:1.92.0
    restart: unless-stopped
    container_name: litellm
    ports:
      - "4444:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      STORE_MODEL_IN_DB: "True"
    command:
      - "--config=/app/config.yaml"
      - "--port=4000"
      - "--host=0.0.0.0"
      - "--num_workers=1"          # Keep single worker for simplicity + predictable concurrency
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - llm-network
      - postgres-network
      - npm-network

  redis:
    image: redis:7-alpine
    container_name: litellm-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - litellm_redis_data:/data
    networks:
      - llm-network

  prometheus:
    image: prom/prometheus:latest
    container_name: litellm-prometheus
    restart: unless-stopped
    ports:
      - "9394:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - llm-network


volumes:
  litellm_redis_data:
  prometheus_data:

networks:
  llm-network:
    external: true
  postgres-network:
    external: true
  npm-network:
    external: true
